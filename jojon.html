<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }</style>
</head>
<body>
    <div id="game"></div>

    <script>
        window.EJS_player = "#game";
        window.EJS_core = "mame2003"; 
        window.EJS_gameName = "JoJo's Bizarre Adventure (Japan)";
        window.EJS_color = "#990000";
        window.EJS_startOnLoaded = true;
        window.EJS_pathtodata = "https://emulatorjs.github.io/EmulatorJS/data/";

     
        window.EJS_gameUrl = "https://1liriozinho.github.io/CNX-Unblock/jojoj.zip"; 
        

        
        window.EJS_Settings = {
            "mame2003-skip-disclaimer": "enabled",
            "mame2003-dcs-speedhack": "enabled",
            "mame2003-samples": "enabled"
        };

        window.EJS_MAME_args = "-rompath / -nowindow -nosound -skip_gameinfo";
    </script>

    <script src="https://emulatorjs.github.io/EmulatorJS/data/loader.js"></script>
</body>
</html>
