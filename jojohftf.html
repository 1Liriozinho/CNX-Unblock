<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoJo HFTF - Arcade</title>
    <style>
        /* Estilo para ocupar a tela toda e remover bordas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script>
        // Configurações do EmulatorJS corrigidas
        window.EJS_player = "#game";
        window.EJS_core = "fbneo"; 
        window.EJS_gameName = "JoJo's Bizarre Adventure (Euro 990913)";
        window.EJS_color = "#990000";
        window.EJS_startOnLoaded = true;
        
        // Caminho dos dados do sistema oficial
        window.EJS_pathtodata = "https://emulatorjs.github.io/EmulatorJS/data/";
        
        // Links diretos do seu repositório (com os nomes corrigidos)
        window.EJS_gameUrl = "https://1liriozinho.github.io/CNX-Unblock/jojoba.zip";
        window.EJS_biosUrl = "https://1liriozinho.github.io/CNX-Unblock/cps3.zip";

        // Comandos extras para aumentar a compatibilidade com ROMs customizadas
        window.EJS_Settings = {
            "fbneo-allow-invalid-romsets": "enabled",
            "fbneo-diagnostic-input": "Hold Start"
        };
    </script>

    <script src="https://emulatorjs.github.io/EmulatorJS/data/loader.js"></script>

</body>
</html>
