<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoJo HFTF - Arcade</title>
    <style>
        /* Remove bordas e faz o emulador ocupar a tela toda */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script>
        // Configurações do EmulatorJS
        window.EJS_player = "#game";
        window.EJS_core = "fbneo"; // Core recomendado para JoJo (CPS3)
        window.EJS_gameName = "JoJo's Bizarre Adventure: HFTF";
        window.EJS_color = "#990000";
        window.EJS_startOnLoaded = false;
        
        // Caminho dos dados do sistema (oficial do projeto)
        window.EJS_pathtodata = "https://emulatorjs.github.io/EmulatorJS/data/";
        
        // Seus links do GitHub Pages (ajustados para HTTPS)
        window.EJS_gameUrl = "https://1liriozinho.github.io/CNX-Unblock/jojobanr1.zip";
        window.EJS_biosUrl = "https://1liriozinho.github.io/CNX-Unblock/ar_bios.zip";
    </script>

    <script src="https://emulatorjs.github.io/EmulatorJS/data/loader.js"></script>

</body>
</html>
