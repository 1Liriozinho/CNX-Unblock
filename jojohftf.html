<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoJo HFTF - Arcade Japan</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="game"></div>

    <script>
        window.EJS_player = "#game";
        
     
        window.EJS_core = "mame2003_plus"; 
        
        window.EJS_gameName = "JoJo's Bizarre Adventure (Japan)";
        window.EJS_color = "#990000";
        window.EJS_startOnLoaded = true;
        
    
        window.EJS_pathtodata = "https://emulatorjs.github.io/EmulatorJS/data/";
        
      
        window.EJS_gameUrl = "https://1liriozinho.github.io/CNX-Unblock/jojobanr1.zip";
        window.EJS_biosUrl = "https://1liriozinho.github.io/CNX-Unblock/cps3.zip";

        window.EJS_MAME_args = "-skip_gameinfo -nowindow";
    </script>

    <script src="https://emulatorjs.github.io/EmulatorJS/data/loader.js"></script>

</body>
</html>
